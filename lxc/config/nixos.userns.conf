# This derives from the global userns config.
# Note: PVE may include both nixos.common.conf and nixos.userns.conf for
# unprivileged containers (matching the pattern of all other distros here),
# in which case the signal/tty/cap settings below are redundant. They are
# repeated here defensively so that unprivileged containers work correctly
# even if PVE only includes this file.
lxc.include = /usr/share/lxc/config/userns.conf

# NixOS/systemd shutdown signal (mirrors nixos.common.conf)
lxc.signal.halt = SIGRTMIN+3

# systemd manages consoles (mirrors nixos.common.conf)
lxc.tty.dir =

# Capability drops (mirrors nixos.common.conf; userns already has full caps
# via lxc.cap.drop = / lxc.cap.keep = reset in userns.conf, so this is a
# belt-and-suspenders re-statement for clarity)
lxc.cap.drop = setfcap sys_nice sys_pacct sys_rawio

# Hooks: render proxnix state during pre-start, then sync it into the mounted
# rootfs during mount (mirrors nixos.common.conf; registered here in case PVE
# only includes this file for unprivileged containers)
lxc.hook.pre-start = /usr/share/lxc/hooks/nixos-proxnix-prestart
lxc.hook.mount = /usr/share/lxc/hooks/nixos-proxnix-mount
