# This derives from the global common config
lxc.include = /usr/share/lxc/config/common.conf

# NixOS uses systemd as PID 1; send it the correct halt signal.
# SIGRTMIN+3 → systemd halt.target (orderly shutdown + power off)
lxc.signal.halt = SIGRTMIN+3

# systemd manages its own console/tty devices; clear the LXC default.
lxc.tty.dir =

# Extra cgroup device access.
# Note: for unprivileged containers, userns.conf.d/01-pve.conf resets
# cgroup2 device rules to allow=a (all), so the cgroup2 lines below only
# take effect for privileged containers. Both sets are kept for symmetry
# and for the privileged case.
## rtc
lxc.cgroup.devices.allow = c 254:0 rm
lxc.cgroup2.devices.allow = c 254:0 rm
## tun — needed for WireGuard, OpenVPN, and similar in-container networking
lxc.cgroup.devices.allow = c 10:200 rwm
lxc.cgroup2.devices.allow = c 10:200 rwm
## hpet
lxc.cgroup.devices.allow = c 10:228 rwm
lxc.cgroup2.devices.allow = c 10:228 rwm
## kvm — useful when running nix-build with sandboxing inside the container
lxc.cgroup.devices.allow = c 10:232 rwm
lxc.cgroup2.devices.allow = c 10:232 rwm
## To use loop devices (e.g. for disk images), copy the following lines to
## the container's own config file (uncommented):
#lxc.cgroup.devices.allow = b 7:* rwm
#lxc.cgroup2.devices.allow = b 7:* rwm

# Capabilities — drop only what is clearly unused on a systemd/NixOS container.
# See comments in fedora.common.conf for what each cap controls.
lxc.cap.drop = setfcap sys_nice sys_pacct sys_rawio

# Hooks: proxnix first renders desired state on the host during pre-start,
# then moves that rendered state into the mounted rootfs during mount.
# The post-stop hook removes any staging artefacts left if mount never ran
# (failed start, aborted hook, etc.).
lxc.hook.pre-start = /usr/share/lxc/hooks/nixos-proxnix-prestart
lxc.hook.mount = /usr/share/lxc/hooks/nixos-proxnix-mount
lxc.hook.post-stop = /usr/share/lxc/hooks/nixos-proxnix-poststop
