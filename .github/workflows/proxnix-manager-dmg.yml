name: proxnix-manager-dmg

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional Git tag to attach app assets to, for example v0.1.0"
        required: false
        type: string
      package_version:
        description: "Optional package version override, for example 0.1.0"
        required: false
        type: string

jobs:
  dmg:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Resolve package version
        run: |
          if [ -n "${{ inputs.package_version }}" ]; then
            echo "PACKAGE_VERSION=${{ inputs.package_version }}" >> "$GITHUB_ENV"
          else
            raw_version="$(./ci/package-version.sh)"
            echo "PACKAGE_VERSION=${raw_version#v}" >> "$GITHUB_ENV"
          fi

      - name: Prepare workstation Python runtime
        run: |
          python -m venv workstation/.venv
          workstation/.venv/bin/python -m pip install --upgrade pip
          workstation/.venv/bin/python -m pip install -e "workstation[manager]"

      - name: Install Electrobun app dependencies
        working-directory: workstation/apps/proxnix-manager-electrobun
        run: bun install --frozen-lockfile

      - name: Import Apple Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          ELECTROBUN_TEAMID: ${{ secrets.ELECTROBUN_TEAMID }}
          ELECTROBUN_APPLEIDPASS: ${{ secrets.ELECTROBUN_APPLEIDPASS }}
          ELECTROBUN_APPLEAPIKEY: ${{ secrets.ELECTROBUN_APPLEAPIKEY }}
        run: |
          if [ -z "$MACOS_CERTIFICATE_P12_BASE64" ]; then
            echo "PROXNIX_MANAGER_MACOS_CODESIGN=0" >> "$GITHUB_ENV"
            echo "PROXNIX_MANAGER_MACOS_NOTARIZE=0" >> "$GITHUB_ENV"
            exit 0
          fi

          keychain_path="$RUNNER_TEMP/proxnix-signing.keychain-db"
          certificate_path="$RUNNER_TEMP/proxnix-developer-id.p12"

          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychain -d user -s "$keychain_path" "$HOME/Library/Keychains/login.keychain-db"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$keychain_path"
          echo "PROXNIX_MANAGER_MACOS_CODESIGN=1" >> "$GITHUB_ENV"
          if [ -n "$ELECTROBUN_TEAMID" ] && { [ -n "$ELECTROBUN_APPLEIDPASS" ] || [ -n "$ELECTROBUN_APPLEAPIKEY" ]; }; then
            echo "PROXNIX_MANAGER_MACOS_NOTARIZE=1" >> "$GITHUB_ENV"
          else
            echo "PROXNIX_MANAGER_MACOS_NOTARIZE=0" >> "$GITHUB_ENV"
          fi

      - name: Build ProxnixManager DMG
        env:
          ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
          ELECTROBUN_TEAMID: ${{ secrets.ELECTROBUN_TEAMID }}
          ELECTROBUN_APPLEID: ${{ secrets.ELECTROBUN_APPLEID }}
          ELECTROBUN_APPLEIDPASS: ${{ secrets.ELECTROBUN_APPLEIDPASS }}
          ELECTROBUN_APPLEAPIISSUER: ${{ secrets.ELECTROBUN_APPLEAPIISSUER }}
          ELECTROBUN_APPLEAPIKEY: ${{ secrets.ELECTROBUN_APPLEAPIKEY }}
          ELECTROBUN_APPLEAPIKEYPATH: ${{ secrets.ELECTROBUN_APPLEAPIKEYPATH }}
        run: |
          VERSION="$PACKAGE_VERSION" ARCH="arm64" ./workstation/packaging/package-macos.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxnix-manager-dmg-${{ env.PACKAGE_VERSION }}-arm64
          path: dist/proxnix-manager-${{ env.PACKAGE_VERSION }}-macos-arm64.dmg
          if-no-files-found: error

      - name: Publish DMG release asset
        if: github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v') || inputs.release_tag != '')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          tag="${RELEASE_TAG:-${GITHUB_REF_NAME}}"
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" --title "Release ${tag}" --generate-notes
          gh release upload "$tag" dist/proxnix-manager-${PACKAGE_VERSION}-macos-arm64.dmg --clobber
