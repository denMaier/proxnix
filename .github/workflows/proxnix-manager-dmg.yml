name: proxnix-manager-dmg

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional Git tag to attach DMG assets to, for example v0.1.0"
        required: false
        type: string
      package_version:
        description: "Optional package version override, for example 0.1.0"
        required: false
        type: string

jobs:
  dmg:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            asset_arch: x86_64
          - runner: macos-14
            asset_arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve package version
        run: |
          if [ -n "${{ inputs.package_version }}" ]; then
            echo "PACKAGE_VERSION=${{ inputs.package_version }}" >> "$GITHUB_ENV"
          else
            raw_version="$(./ci/package-version.sh)"
            echo "PACKAGE_VERSION=${raw_version#v}" >> "$GITHUB_ENV"
          fi

      - name: Prepare workstation Python runtime
        run: |
          python -m venv workstation/.venv
          workstation/.venv/bin/python -m pip install --upgrade pip
          workstation/.venv/bin/python -m pip install "cryptography>=44"

      - name: Build ProxnixManager DMG
        run: |
          VERSION="$PACKAGE_VERSION" ARCH="${{ matrix.asset_arch }}" ./workstation/packaging/package-macos.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxnix-manager-dmg-${{ env.PACKAGE_VERSION }}-${{ matrix.asset_arch }}
          path: dist/proxnix-manager-${{ env.PACKAGE_VERSION }}-macos-${{ matrix.asset_arch }}.dmg
          if-no-files-found: error

      - name: Publish DMG release asset
        if: github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v') || inputs.release_tag != '')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          tag="${RELEASE_TAG:-${GITHUB_REF_NAME}}"
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" --title "Release ${tag}" --generate-notes
          gh release upload "$tag" dist/proxnix-manager-${PACKAGE_VERSION}-macos-${{ matrix.asset_arch }}.dmg --clobber
