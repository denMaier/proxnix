name: proxnix-manager-linux

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional Git tag to attach Linux app assets to, for example v0.1.0"
        required: false
        type: string
      package_version:
        description: "Optional package version override, for example 0.1.0"
        required: false
        type: string

jobs:
  linux:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Resolve package version
        run: |
          if [ -n "${{ inputs.package_version }}" ]; then
            echo "PACKAGE_VERSION=${{ inputs.package_version }}" >> "$GITHUB_ENV"
          else
            raw_version="$(./ci/package-version.sh)"
            echo "PACKAGE_VERSION=${raw_version#v}" >> "$GITHUB_ENV"
          fi

      - name: Prepare workstation Python runtime
        run: |
          python -m venv workstation/.venv
          workstation/.venv/bin/python -m pip install --upgrade pip
          workstation/.venv/bin/python -m pip install -e "workstation[manager]"

      - name: Install Electrobun app dependencies
        working-directory: workstation/apps/proxnix-manager-electrobun
        run: bun install --frozen-lockfile

      - name: Build ProxnixManager Linux archive
        run: |
          VERSION="$PACKAGE_VERSION" ARCH="x64" ./workstation/packaging/package-linux.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxnix-manager-linux-${{ env.PACKAGE_VERSION }}-x64
          path: dist/proxnix-manager-${{ env.PACKAGE_VERSION }}-linux-x64.tar.gz
          if-no-files-found: error

      - name: Publish Linux release asset
        if: github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v') || inputs.release_tag != '')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          tag="${RELEASE_TAG:-${GITHUB_REF_NAME}}"
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" --title "Release ${tag}" --generate-notes
          gh release upload "$tag" dist/proxnix-manager-${PACKAGE_VERSION}-linux-x64.tar.gz --clobber
