name: pypi-publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.version.outputs.package_version }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve package version
        id: version
        run: |
          echo "package_version=$(./ci/package-version.sh)" >> "$GITHUB_OUTPUT"

      - name: Validate tagged release version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PACKAGE_PROJECT_VERSION="$(./ci/workstation-version.sh)"
          if [ "$PACKAGE_PROJECT_VERSION" != "${GITHUB_REF_NAME#v}" ]; then
            echo "workstation package version ${PACKAGE_PROJECT_VERSION} does not match tag ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build workstation Python package
        run: python -m build --outdir dist workstation/cli

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proxnix-workstation-dist-${{ steps.version.outputs.package_version }}
          path: dist/
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: proxnix-workstation-dist-${{ needs.build.outputs.package_version }}
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
