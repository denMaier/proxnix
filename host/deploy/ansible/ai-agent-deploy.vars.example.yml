# Copy this file, fill in the answers gathered from the operator, then run:
#
#   ansible-playbook \
#     -i host/deploy/inventory.proxmox.ini \
#     host/deploy/ansible/ai-agent-deploy.yml \
#     -e @host/deploy/ansible/ai-agent-deploy.vars.yml

# Inventory group passed through to host/deploy/ansible/install.yml.
proxnix_ai_target_hosts_group: proxmox

# Workstation-owned site repo and proxnix config.
proxnix_ai_site_dir: "{{ lookup('env', 'HOME') }}/src/proxnix-site"
proxnix_ai_config_file: "{{ lookup('env', 'HOME') }}/.config/proxnix/config"
proxnix_ai_master_identity: "{{ lookup('env', 'HOME') }}/.ssh/proxnix-master"

# Publish targets written into ~/.config/proxnix/config.
proxnix_ai_publish_hosts:
  - root@node1
  - root@node2

# Optional when SSH config or an agent already handles auth.
# proxnix_ai_publish_ssh_identity: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519"

# `full` publishes secrets and relay identities.
# `config-only` publishes only site.nix and containers/.
proxnix_ai_publish_mode: full

# Create a minimal workstation site repo layout when the directory is empty.
proxnix_ai_create_site_repo: true

# Initialize private/host_relay_identity.sops.yaml when it is missing.
proxnix_ai_init_host_relay: true

# Optional shared admin password hash.
# Generate one with: mkpasswd -m sha-512
# proxnix_ai_shared_admin_password_hash: "$6$..."

# Use the real proxnix exercise harness after publish so the agent gets a report.
proxnix_ai_run_exercise: true
proxnix_ai_exercise_host: root@node1
proxnix_ai_exercise_base_vmid: 940

# Optional exercise overrides.
# proxnix_ai_exercise_template: local:vztmpl/nixos-25.11-x86_64-linux.tar.xz
# proxnix_ai_exercise_storage: local-lvm
# proxnix_ai_exercise_bridge: vmbr0
# proxnix_ai_exercise_ip: dhcp
# proxnix_ai_exercise_gw: 192.168.178.1
# proxnix_ai_exercise_timeout_seconds: 5400
