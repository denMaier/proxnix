---
- name: Install proxnix on Proxmox nodes
  hosts: "{{ proxnix_target_hosts | default('proxmox') }}"
  connection: ssh
  gather_facts: false

  vars:
    proxnix_repo_root: "{{ playbook_dir }}/../../.."
    proxnix_host_root: "{{ playbook_dir }}/../.."
    proxnix_host_runtime_root: "{{ proxnix_host_root }}/runtime"
    proxnix_lxc_config_dir: /usr/share/lxc/config
    proxnix_lxc_hooks_dir: /usr/share/lxc/hooks
    proxnix_lib_dir: /usr/local/lib/proxnix
    proxnix_sbin_dir: /usr/local/sbin
    proxnix_local_bin_dir: /usr/local/bin
    proxnix_systemd_unit_dir: /etc/systemd/system
    proxnix_data_dir: /var/lib/proxnix
    proxnix_private_dir: /var/lib/proxnix/private
    proxnix_host_state_dir: /etc/proxnix
    proxnix_install_manifest: "{{ proxnix_lib_dir }}/install-manifest.txt"
    proxnix_install_info: "{{ proxnix_lib_dir }}/install-info.txt"
    # Valid values:
    # - require-existing: fail if Nix is absent
    # - determinate: install Nix with the Determinate Systems installer if absent
    proxnix_nix_install_mode: require-existing
    proxnix_determinate_nix_install_url: https://install.determinate.systems/nix
    proxnix_host_tools_profile: /nix/var/nix/profiles/proxnix-host-tools
    proxnix_host_tool_packages:
      - nixpkgs#age
      - nixpkgs#jq
      - nixpkgs#rsync
      - nixpkgs#sops
    proxnix_host_tool_commands:
      - age
      - jq
      - rsync
      - sops
    proxnix_directories:
      - path: "{{ proxnix_lib_dir }}"
        mode: "0755"
      - path: "{{ proxnix_data_dir }}"
        mode: "0755"
      - path: "{{ proxnix_private_dir }}"
        mode: "0700"
      - path: "{{ proxnix_host_state_dir }}"
        mode: "0700"
      - path: "{{ proxnix_data_dir }}/containers"
        mode: "0755"
      - path: "{{ proxnix_data_dir }}/authority"
        mode: "0755"
      - path: "{{ proxnix_data_dir }}/status"
        mode: "0755"
      - path: "{{ proxnix_data_dir }}/state"
        mode: "0755"
      - path: "{{ proxnix_data_dir }}/gcroots"
        mode: "0755"
      - path: "{{ proxnix_data_dir }}/gcroots/deploy"
        mode: "0755"
      - path: "{{ proxnix_private_dir }}/shared"
        mode: "0700"
      - path: "{{ proxnix_private_dir }}/containers"
        mode: "0700"
    proxnix_installed_files:
      - src: "{{ proxnix_host_runtime_root }}/lxc/config/nixos.common.conf"
        dest: "{{ proxnix_lxc_config_dir }}/nixos.common.conf"
        mode: "0644"
      - src: "{{ proxnix_host_runtime_root }}/lxc/config/nixos.userns.conf"
        dest: "{{ proxnix_lxc_config_dir }}/nixos.userns.conf"
        mode: "0644"
      - src: "{{ proxnix_host_runtime_root }}/lxc/hooks/nixos-proxnix-prestart"
        dest: "{{ proxnix_lxc_hooks_dir }}/nixos-proxnix-prestart"
        mode: "0755"
      - src: "{{ proxnix_host_runtime_root }}/lxc/hooks/nixos-proxnix-mount"
        dest: "{{ proxnix_lxc_hooks_dir }}/nixos-proxnix-mount"
        mode: "0755"
      - src: "{{ proxnix_host_runtime_root }}/lxc/hooks/nixos-proxnix-poststop"
        dest: "{{ proxnix_lxc_hooks_dir }}/nixos-proxnix-poststop"
        mode: "0755"
      - src: "{{ proxnix_host_runtime_root }}/lib/pve-conf-to-nix.py"
        dest: "{{ proxnix_lib_dir }}/pve-conf-to-nix.py"
        mode: "0755"
      - src: "{{ proxnix_host_runtime_root }}/lib/proxnix_authority_render.py"
        dest: "{{ proxnix_lib_dir }}/proxnix_authority_render.py"
        mode: "0755"
      - src: "{{ proxnix_host_runtime_root }}/lib/proxnix_reconciler_state.py"
        dest: "{{ proxnix_lib_dir }}/proxnix_reconciler_state.py"
        mode: "0755"
      - src: "{{ proxnix_host_runtime_root }}/lxc/hooks/nixos-proxnix-common.sh"
        dest: "{{ proxnix_lib_dir }}/nixos-proxnix-common.sh"
        mode: "0644"
      - src: "{{ proxnix_host_runtime_root }}/lib/proxnix-secrets-guest"
        dest: "{{ proxnix_lib_dir }}/proxnix-secrets-guest"
        mode: "0755"
      - src: "{{ proxnix_host_runtime_root }}/bin/proxnix-doctor"
        dest: "{{ proxnix_sbin_dir }}/proxnix-doctor"
        mode: "0755"
      - src: "{{ proxnix_host_runtime_root }}/bin/proxnix-create-lxc"
        dest: "{{ proxnix_sbin_dir }}/proxnix-create-lxc"
        mode: "0755"
      - src: "{{ proxnix_host_runtime_root }}/bin/proxnix-authority-render"
        dest: "{{ proxnix_sbin_dir }}/proxnix-authority-render"
        mode: "0755"
      - src: "{{ proxnix_host_root }}/install/uninstall.sh"
        dest: "{{ proxnix_sbin_dir }}/proxnix-uninstall"
        mode: "0755"
      - src: "{{ proxnix_host_runtime_root }}/bin/proxnix-gc"
        dest: "{{ proxnix_sbin_dir }}/proxnix-gc"
        mode: "0755"
      - src: "{{ proxnix_host_runtime_root }}/bin/proxnix-reconcile"
        dest: "{{ proxnix_sbin_dir }}/proxnix-reconcile"
        mode: "0755"
      - src: "{{ proxnix_host_runtime_root }}/bin/proxnix-reconcile-build-golden"
        dest: "{{ proxnix_sbin_dir }}/proxnix-reconcile-build-golden"
        mode: "0755"
      - src: "{{ proxnix_host_runtime_root }}/bin/proxnix-reconcile-build"
        dest: "{{ proxnix_sbin_dir }}/proxnix-reconcile-build"
        mode: "0755"
      - src: "{{ proxnix_host_runtime_root }}/bin/proxnix-reconcile-seed"
        dest: "{{ proxnix_sbin_dir }}/proxnix-reconcile-seed"
        mode: "0755"
      - src: "{{ proxnix_host_runtime_root }}/bin/proxnix-reconcile-seed-offline"
        dest: "{{ proxnix_sbin_dir }}/proxnix-reconcile-seed-offline"
        mode: "0755"
      - src: "{{ proxnix_host_runtime_root }}/bin/proxnix-reconcile-activate"
        dest: "{{ proxnix_sbin_dir }}/proxnix-reconcile-activate"
        mode: "0755"
      - src: "{{ proxnix_host_runtime_root }}/bin/proxnix-reconciler-state"
        dest: "{{ proxnix_sbin_dir }}/proxnix-reconciler-state"
        mode: "0755"
      - src: "{{ proxnix_host_runtime_root }}/systemd/proxnix-gc.service"
        dest: "{{ proxnix_systemd_unit_dir }}/proxnix-gc.service"
        mode: "0644"
      - src: "{{ proxnix_host_runtime_root }}/systemd/proxnix-gc.timer"
        dest: "{{ proxnix_systemd_unit_dir }}/proxnix-gc.timer"
        mode: "0644"
      - src: "{{ proxnix_host_runtime_root }}/systemd/proxnix-reconcile.service"
        dest: "{{ proxnix_systemd_unit_dir }}/proxnix-reconcile.service"
        mode: "0644"
      - src: "{{ proxnix_host_runtime_root }}/systemd/proxnix-reconcile@.service"
        dest: "{{ proxnix_systemd_unit_dir }}/proxnix-reconcile@.service"
        mode: "0644"
      - src: "{{ proxnix_host_runtime_root }}/nix/base.nix"
        dest: "{{ proxnix_data_dir }}/base.nix"
        mode: "0644"
      - src: "{{ proxnix_host_runtime_root }}/nix/common.nix"
        dest: "{{ proxnix_data_dir }}/common.nix"
        mode: "0644"
      - src: "{{ proxnix_host_runtime_root }}/nix/security-policy.nix"
        dest: "{{ proxnix_data_dir }}/security-policy.nix"
        mode: "0644"
      - src: "{{ proxnix_host_runtime_root }}/nix/configuration.nix"
        dest: "{{ proxnix_data_dir }}/configuration.nix"
        mode: "0644"

  pre_tasks:
    - name: Ensure this playbook targets remote SSH hosts
      ansible.builtin.assert:
        that:
          - ansible_connection == 'ssh'
          - inventory_hostname not in ['localhost', '127.0.0.1', '::1']
          - (ansible_host | default(inventory_hostname)) not in ['localhost', '127.0.0.1', '::1']
        fail_msg: >-
          host/deploy/ansible/install.yml deploys proxnix to remote Proxmox hosts over SSH.
          Add the target node to the Ansible inventory and run this playbook from a control machine.

    - name: Verify the target is a Proxmox host
      ansible.builtin.command: pveversion
      changed_when: false

    - name: Check whether nix is installed
      ansible.builtin.command: nix --version
      register: proxnix_nix_check
      changed_when: false
      failed_when: false

    - name: Validate Nix install mode
      ansible.builtin.assert:
        that:
          - proxnix_nix_install_mode in ['require-existing', 'determinate']
        fail_msg: "proxnix_nix_install_mode must be 'require-existing' or 'determinate'"

    - name: Install Nix with Determinate Systems installer when requested
      ansible.builtin.shell: |
        set -eu
        curl --proto '=https' --tlsv1.2 -sSf -L {{ proxnix_determinate_nix_install_url | quote }} | sh -s -- install --no-confirm
      args:
        creates: /nix/nix-installer
        executable: /bin/bash
      when:
        - proxnix_nix_install_mode == 'determinate'
        - proxnix_nix_check.rc != 0

    - name: Fail when nix is missing
      ansible.builtin.fail:
        msg: "nix is not installed; install Nix first or rerun with -e proxnix_nix_install_mode=determinate"
      when:
        - proxnix_nix_install_mode == 'require-existing'
        - proxnix_nix_check.rc != 0

    - name: Verify nix is installed on the target host
      ansible.builtin.command: nix --version
      changed_when: false

    - name: Ensure /etc/nix exists
      ansible.builtin.file:
        path: /etc/nix
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Enable nix-command and flakes
      ansible.builtin.lineinfile:
        path: /etc/nix/nix.conf
        regexp: '^experimental-features\s*='
        line: experimental-features = nix-command flakes
        create: true
        owner: root
        group: root
        mode: "0644"

    - name: Restart nix-daemon after nix.conf changes
      ansible.builtin.systemd:
        name: nix-daemon.service
        state: restarted
        daemon_reload: true
      failed_when: false

    - name: Verify nix-command and flakes are enabled
      ansible.builtin.command: nix --extra-experimental-features "nix-command flakes" eval --expr true
      changed_when: false

    - name: Install proxnix host tools with Nix
      ansible.builtin.shell: |
        set -eu
        profile={{ proxnix_host_tools_profile | quote }}
        commands=({% for tool in proxnix_host_tool_commands %}{{ tool | quote }} {% endfor %})
        packages=({% for package in proxnix_host_tool_packages %}{{ package | quote }} {% endfor %})
        missing=()

        for index in "${!commands[@]}"; do
          tool="${commands[$index]}"
          package="${packages[$index]}"
          if [ ! -x "$profile/bin/$tool" ]; then
            missing+=("$package")
          fi
        done

        if [ "${#missing[@]}" -eq 0 ]; then
          exit 0
        fi

        nix profile install --profile "$profile" "${missing[@]}"
      args:
        executable: /bin/bash
      register: proxnix_host_tools_install
      changed_when: proxnix_host_tools_install.stdout != "" or proxnix_host_tools_install.stderr != ""

    - name: Expose proxnix host tools on PATH
      ansible.builtin.file:
        src: "{{ proxnix_host_tools_profile }}/bin/{{ item }}"
        dest: "{{ proxnix_local_bin_dir }}/{{ item }}"
        state: link
        owner: root
        group: root
        force: false
      loop: "{{ proxnix_host_tool_commands }}"

    - name: Verify proxnix host tools are installed on the target host
      ansible.builtin.command: "{{ item }} --version"
      changed_when: false
      loop: "{{ proxnix_host_tool_commands }}"

  tasks:
    - name: Ensure proxnix-managed directories exist
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop: "{{ proxnix_directories }}"

    - name: Install proxnix files
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop: "{{ proxnix_installed_files }}"

    - name: Write proxnix install manifest
      ansible.builtin.copy:
        dest: "{{ proxnix_install_manifest }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          /usr/share/lxc/config/nixos.common.conf
          /usr/share/lxc/config/nixos.userns.conf
          /usr/share/lxc/hooks/nixos-proxnix-prestart
          /usr/share/lxc/hooks/nixos-proxnix-mount
          /usr/share/lxc/hooks/nixos-proxnix-poststop
          /usr/local/lib/proxnix/pve-conf-to-nix.py
          /usr/local/lib/proxnix/proxnix_authority_render.py
          /usr/local/lib/proxnix/proxnix_reconciler_state.py
          /usr/local/lib/proxnix/nixos-proxnix-common.sh
          /usr/local/lib/proxnix/proxnix-secrets-guest
          /usr/local/lib/proxnix/install-manifest.txt
          /usr/local/lib/proxnix/install-info.txt
          /usr/local/sbin/proxnix-doctor
          /usr/local/sbin/proxnix-create-lxc
          /usr/local/sbin/proxnix-authority-render
          /usr/local/sbin/proxnix-gc
          /usr/local/sbin/proxnix-reconcile
          /usr/local/sbin/proxnix-reconcile-build-golden
          /usr/local/sbin/proxnix-reconcile-build
          /usr/local/sbin/proxnix-reconcile-seed
          /usr/local/sbin/proxnix-reconcile-seed-offline
          /usr/local/sbin/proxnix-reconcile-activate
          /usr/local/sbin/proxnix-reconciler-state
          /usr/local/sbin/proxnix-uninstall
          /usr/local/bin/age
          /usr/local/bin/jq
          /usr/local/bin/rsync
          /usr/local/bin/sops
          /nix/var/nix/profiles/proxnix-host-tools
          /etc/systemd/system/proxnix-gc.service
          /etc/systemd/system/proxnix-gc.timer
          /etc/systemd/system/proxnix-reconcile.service
          /etc/systemd/system/proxnix-reconcile@.service
          /var/lib/proxnix/base.nix
          /var/lib/proxnix/common.nix
          /var/lib/proxnix/security-policy.nix
          /var/lib/proxnix/configuration.nix

    - name: Write proxnix install info
      ansible.builtin.copy:
        dest: "{{ proxnix_install_info }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          proxnix host install
          ====================

          This node no longer depends on the original proxnix repo checkout for normal
          operations.

          Installed local commands:
          - proxnix-authority-render
          - proxnix-create-lxc
          - proxnix-doctor
          - proxnix-gc
          - proxnix-reconcile
          - proxnix-reconcile-build-golden
          - proxnix-reconcile-build
          - proxnix-reconcile-seed
          - proxnix-reconcile-seed-offline
          - proxnix-reconcile-activate
          - proxnix-reconciler-state
          - proxnix-uninstall

          Managed local runtime files are listed in:
          {{ proxnix_install_manifest }}

          Published relay data remains external:
          - {{ proxnix_data_dir }}
          - {{ proxnix_host_state_dir }}

          To remove only the installed proxnix runtime from this node, run:
            proxnix-uninstall

          proxnix-uninstall removes the proxnix host tool symlinks and profile.
          It does not remove Nix itself.

    - name: Enable proxnix GC timer
      ansible.builtin.systemd:
        name: proxnix-gc.timer
        enabled: true
        state: started
        daemon_reload: true

    - name: Ensure legacy full reconcile timer is disabled
      ansible.builtin.systemd:
        name: proxnix-reconcile.timer
        enabled: false
        state: stopped
      failed_when: false
