---
- name: Install proxnix on Proxmox nodes
  hosts: "{{ proxnix_target_hosts | default('proxmox') }}"
  connection: ssh
  gather_facts: false

  vars:
    proxnix_host_profile: /nix/var/nix/profiles/proxnix-host
    proxnix_host_flake_ref_default: github:denMaier/proxnix#proxnix-host
    proxnix_nix_default_bin: /nix/var/nix/profiles/default/bin/nix
    proxnix_nix_env_default_bin: /nix/var/nix/profiles/default/bin/nix-env
    proxnix_template_bootstrap_enabled: false
    proxnix_template_bootstrap_dry_run: false
    proxnix_template_storage: local
    proxnix_template_name: proxnix-nixos-golden.tar.xz
    proxnix_template_source_name: ""
    proxnix_template_rootfs_storage: auto
    proxnix_template_temp_vmid: ""
    proxnix_template_force: false
    proxnix_template_install_lock_wait_seconds: 7200
    proxnix_template_install_lock_ttl_seconds: 7200
    # Valid values:
    # - determinate: install Nix with the Determinate Systems installer if absent
    # - require-existing: fail if Nix is absent
    proxnix_nix_install_mode: determinate
    proxnix_determinate_nix_install_url: https://install.determinate.systems/nix

  pre_tasks:
    - name: Ensure this playbook targets remote SSH hosts
      ansible.builtin.assert:
        that:
          - ansible_connection == 'ssh'
          - inventory_hostname not in ['localhost', '127.0.0.1', '::1']
          - (ansible_host | default(inventory_hostname)) not in ['localhost', '127.0.0.1', '::1']
        fail_msg: >-
          host/deploy/ansible/install.yml deploys proxnix to remote Proxmox hosts over SSH.
          Add the target node to the Ansible inventory and run this playbook from a control machine.

    - name: Verify the target is a Proxmox host
      ansible.builtin.command: pveversion
      changed_when: false

    - name: Prepare shared template bootstrap lock when enabled
      ansible.builtin.import_tasks: tasks/template-bootstrap-lock.yml
      when: proxnix_template_bootstrap_enabled | bool

    - name: Ensure Nix is installed and flakes are enabled
      ansible.builtin.import_tasks: tasks/nix-runtime.yml

  tasks:
    - name: Install and activate proxnix host profile
      ansible.builtin.import_tasks: tasks/proxnix-host-profile.yml

    - name: Bootstrap proxnix golden template when enabled
      ansible.builtin.import_tasks: tasks/template-bootstrap.yml
      when: proxnix_template_bootstrap_enabled | bool

  post_tasks:
    - name: Release shared template bootstrap lock when held
      ansible.builtin.import_tasks: tasks/template-bootstrap-unlock.yml
      when:
        - proxnix_template_install_lock_result is defined
        - not (proxnix_template_install_lock_result.skipped | default(false))
